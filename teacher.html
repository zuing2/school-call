<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교무실 호출 수신 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen p-6 text-white">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold text-emerald-400">🖥️ 교무실 실시간 호출 모니터</h1>
            <div class="flex items-center gap-2">
                <span class="inline-block w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-slate-400 font-medium">실시간 연결 중</span>
            </div>
        </header>

        <div class="bg-slate-800 rounded-2xl p-6 shadow-2xl border border-slate-700">
            <h2 class="text-xl font-semibold mb-4 text-slate-300">현재 대기 중인 호출</h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400 text-sm">
                            <th class="p-4">시간</th>
                            <th class="p-4">학생 정보</th>
                            <th class="p-4">찾는 선생님</th>
                            <th class="p-4">관리</th>
                        </tr>
                    </thead>
                    <tbody id="callList">
                        </tbody>
                </table>
                <div id="noCalls" class="text-center py-12 text-slate-500 text-lg">
                    현재 들어온 호출이 없습니다. 😊
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compatibility.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compatibility.js"></script>

    <script>
        // 1. 🔥 여기에 본인의 Firebase Config 내용을 붙여넣으세요!
       const firebaseConfig = {
  apiKey: "AIzaSyBCTYGb7kmndhvBqNdu2614keRBukVn6xI",
  authDomain: "call-system-88ba3.firebaseapp.com",
  databaseURL: "https://call-system-88ba3-default-rtdb.firebaseio.com",
  projectId: "call-system-88ba3",
  storageBucket: "call-system-88ba3.firebasestorage.app",
  messagingSenderId: "71439966815",
  appId: "1:71439966815:web:73047aa7efe6cc671ab1ea"
};

        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 딩동~ 벨소리를 웹 브라우저 자체 기능으로 연주하는 함수 (따로 음악 파일이 필요 없어요!)
        function playDingDong() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            
            // 첫 번째 음 (딩)
            let osc1 = ctx.createOscillator();
            let gain1 = ctx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5 음
            gain1.gain.setValueAtTime(0.3, ctx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
            osc1.connect(gain1);
            gain1.connect(ctx.destination);
            osc1.start();
            osc1.stop(ctx.currentTime + 0.4);

            // 두 번째 음 (동)
            setTimeout(() => {
                let osc2 = ctx.createOscillator();
                let gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(415.30, ctx.currentTime); // G#4 음
                gain2.gain.setValueAtTime(0.3, ctx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                osc2.connect(gain2);
                gain2.connect(ctx.destination);
                osc2.start();
                osc2.stop(ctx.currentTime + 0.6);
            }, 300);
        }

        // Firebase에서 실시간 데이터 감지하기
        const callListTable = document.getElementById('callList');
        const noCallsDiv = document.getElementById('noCalls');

        database.ref('calls').on('value', (snapshot) => {
            callListTable.innerHTML = ''; // 테이블 초기화
            const data = snapshot.val();

            if (!data) {
                noCallsDiv.classList.remove('hidden');
                return;
            }
            noCallsDiv.classList.add('hidden');

            // 데이터를 최신순으로 화면에 출력
            Object.keys(data).forEach((key) => {
                const call = data[key];
                const date = new Date(call.timestamp);
                const timeString = date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-700/50 hover:bg-slate-700/30 transition";
                tr.innerHTML = `
                    <td class="p-4 text-slate-400 text-sm">${timeString}</td>
                    <td class="p-4 font-semibold text-white">${call.studentName}</td>
                    <td class="p-4"><span class="bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full text-sm font-medium border border-emerald-500/20">${call.teacherName}</span></td>
                    <td class="p-4"><button onclick="deleteCall('${key}')" class="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-lg text-sm hover:bg-rose-500 hover:text-white transition">확인 완료</button></td>
                `;
                // 최신 호출이 맨 위로 오도록 추가
                callListTable.insertBefore(tr, callListTable.firstChild);
            });
        });

        // 새로운 호출이 들어왔을 때 소리 내기
        let isFirstLoad = true;
        database.ref('calls').limitToLast(1).on('child_added', (snapshot) => {
            if (isFirstLoad) {
                setTimeout(() => { isFirstLoad = false; }, 1000);
                return;
            }
            playDingDong();
        });

        // 확인 완료 누르면 파이어베이스 대시보드에서만 삭제하는 함수 (구글 시트 로그는 그대로 남습니다!)
        function deleteCall(key) {
            database.ref('calls').child(key).remove();
        }
    </script>
</body>
</html>
